name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  backend-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build gateway
        run: cd services/gateway && go build ./...
      - name: Vet gateway
        run: cd services/gateway && go vet ./...

  backend-achievement:
    name: Build Achievement Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build achievement service
        run: cd services/achievement && go build ./...
      - name: Vet achievement service
        run: cd services/achievement && go vet ./...

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx vue-tsc -b --noEmit
      - name: Build
        run: cd frontend && npm run build

  docker-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-gateway, backend-achievement, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        run: |
          docker build -f services/gateway/Dockerfile -t ${{ env.IMAGE_PREFIX }}/gateway:latest .
          docker push ${{ env.IMAGE_PREFIX }}/gateway:latest

      - name: Build and push achievement
        run: |
          docker build -f services/achievement/Dockerfile -t ${{ env.IMAGE_PREFIX }}/achievement:latest .
          docker push ${{ env.IMAGE_PREFIX }}/achievement:latest

      - name: Build and push frontend
        run: |
          docker build -f frontend/Dockerfile --target prod -t ${{ env.IMAGE_PREFIX }}/frontend:latest frontend/
          docker push ${{ env.IMAGE_PREFIX }}/frontend:latest

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: [docker-push]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd ~/achievement-leveling
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
