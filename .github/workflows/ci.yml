name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build gateway
        run: cd services/gateway && go build ./...
      - name: Vet gateway
        run: cd services/gateway && go vet ./...

  backend-achievement:
    name: Build Achievement Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build achievement service
        run: cd services/achievement && go build ./...
      - name: Vet achievement service
        run: cd services/achievement && go vet ./...

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx vue-tsc -b --noEmit
      - name: Build
        run: cd frontend && npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-gateway, backend-achievement, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway image
        run: docker build -f services/gateway/Dockerfile -t achievement-leveling-gateway .
      - name: Build achievement image
        run: docker build -f services/achievement/Dockerfile -t achievement-leveling-achievement .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t achievement-leveling-frontend --target prod frontend/

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/achievement-leveling
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
