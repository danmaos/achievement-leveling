services:
  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://yourdomain.com}
    ports:
      - "3000:80"
    volumes: []

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
      - frontend

volumes:
  caddy_data:
  caddy_config:
